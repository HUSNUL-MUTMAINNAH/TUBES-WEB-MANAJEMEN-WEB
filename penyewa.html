<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<title>Penyewa</title>
<link rel='stylesheet' href='assets/css/style.css'>
<link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css'>
</head>
<body onload='renderPenyewa();'>
<div class='navbar-custom'>
 <div class='container d-flex justify-content-between'>
   <h4 class='text-white'>Sistem Manajemen Kos</h4>
   <div>
     <a class='nav-link-custom' href='dashboard.html'>Dashboard</a>
     <a class='nav-link-custom' href='kamar.html'>Kamar</a>
     <a class='nav-link-custom' href='pembayaran.html'>Pembayaran</a>
     <a class='nav-link-custom' href='index.html' onclick='logout()'>Logout</a>
   </div>
 </div>
</div>

<div class='container mt-4'>
 <div class='d-flex justify-content-between mb-3'>
   <h4>Data Penyewa</h4>
   <button class='btn btn-primary' data-bs-toggle='modal' data-bs-target='#modalPenyewa'>Tambah Penyewa</button>
 </div>

 <table class='table table-striped'>
   <thead><tr><th>#</th><th>Nama</th><th>Kamar</th><th>Telp</th><th>Aksi</th></tr></thead>
   <tbody id='tablePenyewa'></tbody>
 </table>
</div>

<div class='modal fade' id='modalPenyewa'>
 <div class='modal-dialog'>
   <form class='modal-content' onsubmit='addPenyewa();return false;'>
     <div class='modal-header'><h5>Tambah Penyewa</h5></div>
     <div class='modal-body'>
       <input id='penNama' class='form-control mb-2' placeholder='Nama'>
       <input id='penKamar' class='form-control mb-2' placeholder='Nomor Kamar'>
       <input id='penTelp' class='form-control mb-2' placeholder='Telepon'>
     </div>
     <div class='modal-footer'><button class='btn btn-primary'>Simpan</button></div>
   </form>
 </div>
</div>

<script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js'></script>
<script src='assets/js/auth.js'></script>
<script src='assets/js/penyewa.js'></script>
</body>
</html>
