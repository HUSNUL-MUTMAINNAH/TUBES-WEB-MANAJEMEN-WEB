<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<title>Dashboard</title>
<link rel='stylesheet' href='assets/css/style.css'>
<link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css'>
</head>
<body onload='loadDashboard();'>
<div class='navbar-custom'>
 <div class='container d-flex justify-content-between'>
   <h4 class='text-white'>Sistem Manajemen Kos</h4>
   <div>
     <a class='nav-link-custom' href='kamar.html'>Kamar</a>
     <a class='nav-link-custom' href='penyewa.html'>Penyewa</a>
     <a class='nav-link-custom' href='pembayaran.html'>Pembayaran</a>
     <a class='nav-link-custom' href='index.html' onclick='logout()'>Logout</a>
   </div>
 </div>
</div>
<div class='container mt-4'>
 <div class='row g-3'>
   <div class='col-md-4'><div class='card card-custom p-3'><small>Total Kamar</small><h2 id='countKamar'>0</h2></div></div>
   <div class='col-md-4'><div class='card card-custom p-3'><small>Total Penyewa</small><h2 id='countPenyewa'>0</h2></div></div>
   <div class='col-md-4'><div class='card card-custom p-3'><small>Total Pembayaran</small><h2 id='countBayar'>0</h2></div></div>
 </div>
</div>
<script src='assets/js/auth.js'></script>
<script src='assets/js/kamar.js'></script>
<script src='assets/js/penyewa.js'></script>
<script src='assets/js/pembayaran.js'></script>
<script>
function loadDashboard(){
 document.getElementById('countKamar').innerText = (JSON.parse(localStorage.getItem('kamar'))||[]).length;
 document.getElementById('countPenyewa').innerText = (JSON.parse(localStorage.getItem('penyewa'))||[]).length;
 document.getElementById('countBayar').innerText = (JSON.parse(localStorage.getItem('pembayaran'))||[]).length;
}
</script>
</body></html>
